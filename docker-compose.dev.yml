# ── Development Docker Compose ──
# Usage: docker compose -f docker-compose.dev.yml up -d
# Configure ports and credentials via .env (see .env.example)
# Hot reload: API recompiles on save (SWC), frontend has Vite HMR

services:
  # ── Infrastructure ──

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pulseboard}
      POSTGRES_USER: ${POSTGRES_USER:-pulseboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulseboard_dev}
    ports:
      - "${POSTGRES_PORT:-9001}:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pulseboard}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-9002}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir=/data"]
    ports:
      - "${NATS_PORT:-9003}:4222"
      - "${NATS_MONITOR_PORT:-9004}:8222"
    volumes:
      - natsdata_dev:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT:-9040}:9000"
      - "${MINIO_CONSOLE_PORT:-9041}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data_dev:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── API Gateway (hot reload via nest start --watch + SWC) ──

  api-gateway:
    image: oven/bun:1-alpine
    working_dir: /app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: >
      sh -c "
        bun install &&
        cd packages/shared-types && bun run build &&
        cd ../../packages/shared-db && bun run build &&
        cd ../../apps/api-gateway && bun run dev
      "
    ports:
      - "${API_PORT:-9010}:3000"
    volumes:
      - .:/app
      - node_modules_dev:/app/node_modules
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-pulseboard}:${POSTGRES_PASSWORD:-pulseboard_dev}@postgres:5432/${POSTGRES_DB:-pulseboard}
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-minio}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-pulseboard}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PUBLIC_ENDPOINT: ${STORAGE_PUBLIC_ENDPOINT:-http://localhost:9040}
      STORAGE_ACCESS_KEY: ${MINIO_ROOT_USER:-pulseboard}
      STORAGE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-pulseboard_dev}
      STORAGE_FORCE_PATH_STYLE: "true"
      NODE_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Web SPA (Vite dev server with HMR) ──

  web:
    image: oven/bun:1-alpine
    working_dir: /app
    command: >
      sh -c "
        bun install &&
        cd packages/shared-types && bun run build &&
        cd ../../apps/web && bunx --bun vite --host 0.0.0.0 --port 5173
      "
    ports:
      - "${WEB_PORT:-9020}:5173"
    volumes:
      - .:/app
      - node_modules_dev:/app/node_modules
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:9010/api}

  # ── Dagster ETL (webserver + daemon) ──

  dagster-webserver:
    build:
      context: ./pipelines
    command: dagster-webserver -h 0.0.0.0 -p 3070 -w workspace.yaml
    ports:
      - "${DAGSTER_PORT:-9030}:3070"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./pipelines:/app
      - dagster_home_dev:/app/dagster_home
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pulseboard}:${POSTGRES_PASSWORD:-pulseboard_dev}@postgres:5432/${POSTGRES_DB:-pulseboard}
      DAGSTER_PG_URL: postgresql://${POSTGRES_USER:-pulseboard}:${POSTGRES_PASSWORD:-pulseboard_dev}@postgres:5432/${POSTGRES_DB:-pulseboard}
      DAGSTER_HOME: /app/dagster_home
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy

  dagster-daemon:
    build:
      context: ./pipelines
    command: dagster-daemon run -w workspace.yaml
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./pipelines:/app
      - dagster_home_dev:/app/dagster_home
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pulseboard}:${POSTGRES_PASSWORD:-pulseboard_dev}@postgres:5432/${POSTGRES_DB:-pulseboard}
      DAGSTER_PG_URL: postgresql://${POSTGRES_USER:-pulseboard}:${POSTGRES_PASSWORD:-pulseboard_dev}@postgres:5432/${POSTGRES_DB:-pulseboard}
      DAGSTER_HOME: /app/dagster_home
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-production}
      SYNC_MIN_INTERVAL_SECONDS: ${SYNC_MIN_INTERVAL_SECONDS:-21600}
    depends_on:
      postgres:
        condition: service_healthy

  # ── Cloudflare Tunnel (expose dev to the internet) ──

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: pulseboard-cloudflared
    restart: unless-stopped
    command: tunnel run
    environment:
      TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN}"
    networks:
      - default

volumes:
  pgdata_dev:
  natsdata_dev:
  node_modules_dev:
  dagster_home_dev:
  minio_data_dev:
