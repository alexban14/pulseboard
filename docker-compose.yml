# ── Production Docker Compose ──
# Usage: docker compose up -d
# Configure ports and credentials via .env (see .env.example)

services:
  # ── Infrastructure ──

  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pulseboard}
      POSTGRES_USER: ${POSTGRES_USER:-pulseboard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulseboard_dev}
    ports:
      - "${POSTGRES_PORT:-9001}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pulseboard}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-9002}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir=/data"]
    ports:
      - "${NATS_PORT:-9003}:4222"
      - "${NATS_MONITOR_PORT:-9004}:8222"
    volumes:
      - natsdata:/data
    restart: unless-stopped

  # ── Application ──

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    ports:
      - "${API_PORT:-9010}:3000"
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-pulseboard}:${POSTGRES_PASSWORD:-pulseboard_dev}@postgres:5432/${POSTGRES_DB:-pulseboard}
      REDIS_URL: redis://redis:6379
      NATS_URL: nats://nats:4222
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-3600}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:9010/api}
    ports:
      - "${WEB_PORT:-9020}:80"
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  pgdata:
  natsdata:
